# Automação do GitHub Actions: coleta as notícias na nuvem e publica a página
# no GitHub Pages. Roda todo dia de manhã, sem depender do computador local.
name: Atualizar notícias

on:
  schedule:
    # O agendador do GitHub é "melhor esforço": atrasa horas ou pula rodadas.
    # Por isso agendamos a cada 2h durante o dia — mesmo que ele pule
    # algumas, a página se mantém fresca. Horários em UTC (Brasília = UTC-3).
    - cron: "23 9-21/2 * * *" # 9h23 às 21h23 UTC = 6h23 às 18h23 de Brasília
  workflow_dispatch: # permite rodar manualmente pelo site do GitHub
  push:
    branches: [main] # também atualiza quando o código mudar

permissions:
  pages: write # publicar no GitHub Pages
  id-token: write # exigido pela etapa de publicação

jobs:
  atualizar-e-publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.publicar.outputs.page_url }}
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v6

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Coletar notícias e gerar a página
        run: python atualizar.py

      - name: Empacotar a pasta site/
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Publicar no GitHub Pages
        id: publicar
        uses: actions/deploy-pages@v5
